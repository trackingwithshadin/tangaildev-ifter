<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Tangail Tech Community</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        .dashboard-container {
            padding: 40px 24px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: white;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .dashboard-header h2 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .stat-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--primary-light);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-info h4 {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-info span {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        th,
        td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--bg-light);
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 18px;
            background: white;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .table-wrap {
            overflow-x: auto;
        }

        .btn-danger {
            color: #ef4444;
            border-color: #fca5a5;
            background: white;
        }

        .btn-danger:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }
    </style>
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-overlay"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-main); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="form-card" style="width:100%; max-width:400px; text-align:center;">
            <div class="stat-icon" style="margin: 0 auto 20px;"><i class="ph-fill ph-lock-key"></i></div>
            <h3 style="margin-bottom:8px;">Admin Login</h3>
            <p style="color:var(--text-secondary); margin-bottom:24px;">Please enter the password to access the
                dashboard.</p>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Password" style="text-align:center;">
            </div>
            <p id="login-error" style="color:red; font-size:14px; margin-bottom:16px; display:none;">Incorrect password
            </p>
            <button class="btn btn-primary w-100" onclick="verifyLogin()">Login <i
                    class="ph ph-arrow-right"></i></button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="brand">
                <span class="brand-text">TANGAIL.MY</span>
            </a>
            <div class="nav-right">
                <a href="index.html" class="btn btn-outline btn-sm"><i class="ph ph-arrow-left"></i> Back to
                    Homepage</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">

        <div class="dashboard-header">
            <h2><i class="ph-fill ph-circles-four"></i> Registration Dashboard</h2>
            <button class="btn btn-danger btn-sm" onclick="clearData()"><i class="ph ph-trash"></i> Delete All
                Records</button>
        </div>

        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-icon"><i class="ph-fill ph-users"></i></div>
                <div class="stat-info">
                    <h4>Total Active Bookings</h4>
                    <span id="stat-total">20</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fef9c3; color: #a16207;"><i class="ph-fill ph-user-plus"></i>
                </div>
                <div class="stat-info">
                    <h4>New Registrations</h4>
                    <span id="stat-new">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fee2e2; color: #b91c1c;"><i class="ph-fill ph-ticket"></i>
                </div>
                <div class="stat-info">
                    <h4>Remaining Seats</h4>
                    <span id="stat-remaining">20</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #dcfce7; color: #15803d;"><i
                        class="ph-fill ph-currency-circle-dollar"></i>
                </div>
                <div class="stat-info">
                    <h4>Total Collection</h4>
                    <span id="stat-amount">৳ 0</span>
                </div>
            </div>
        </div>

        <div class="table-wrap" id="table-container">
            <!-- Table will be injected here via JavaScript -->
        </div>

    </div>

    <script>
        const TOTAL_SEATS = 40;
        const BASE_BOOKINGS = 20;

        function loadDashboard() {
            let bookings = JSON.parse(localStorage.getItem('iftar_bookings')) || [];

            // Update Stats
            let actualBooked = BASE_BOOKINGS + bookings.length;
            if (actualBooked > TOTAL_SEATS) actualBooked = TOTAL_SEATS;
            let remaining = TOTAL_SEATS - actualBooked;

            // Calculate total amount
            let totalAmount = bookings.reduce((sum, b) => sum + (b.amount || 100), 0);

            document.getElementById('stat-total').innerText = actualBooked;
            document.getElementById('stat-new').innerText = bookings.length;
            document.getElementById('stat-remaining').innerText = remaining;
            document.getElementById('stat-amount').innerText = '৳ ' + totalAmount.toLocaleString();

            // Render Table
            const container = document.getElementById('table-container');

            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="ph ph-folder-open" style="font-size: 48px; margin-bottom: 16px;"></i>
                        <p>No new registrations found via the form yet.</p>
                    </div>
                `;
                return;
            }

            let tableHTML = `
                <table id="bookings-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Amount</th>
                            <th>Social / Profile</th>
                            <th>Transaction ID</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            bookings.reverse().forEach(b => {
                const date = new Date(b.date);
                const formatter = new Intl.DateTimeFormat('en-GB', {
                    day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                });
                const amount = b.amount || 100;

                tableHTML += `
                    <tr>
                        <td style="color: var(--text-secondary); font-size: 14px;">${formatter.format(date)}</td>
                        <td><strong>${b.name}</strong></td>
                        <td>${b.phone}</td>
                        <td>${b.email}</td>
                        <td><span style="background: #dcfce7; color: #15803d; padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 14px;">৳ ${amount}</span></td>
                        <td><a href="${b.link}" target="_blank" style="color:var(--primary); text-decoration:underline;">View Profile ↗</a></td>
                        <td><code style="background: var(--bg-light); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color);">${b.trxId}</code></td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            container.innerHTML = tableHTML;
        }

        function clearData() {
            if (confirm("Are you sure you want to delete all form submissions? This cannot be undone.")) {
                localStorage.removeItem('iftar_bookings');
                loadDashboard();
            }
        }

        // Initialize on load
        window.onload = () => {
            // check session
            if (sessionStorage.getItem('admin_logged_in') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                loadDashboard();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        function verifyLogin() {
            const pass = document.getElementById('admin-pass').value;
            // The requested password can be changed here
            if (pass === 'admin123' || pass === 'shadin2026') {
                sessionStorage.setItem('admin_logged_in', 'true');
                document.getElementById('login-overlay').style.display = 'none';
                loadDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // add enter key listener
        document.getElementById('admin-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyLogin();
            }
        });
    </script>
</body>

</html>
